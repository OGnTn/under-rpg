name: Deploy Web Export

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7.0
  EXPORT_NAME: Web
  EXPORT_PATH: build/web/index.html

jobs:
  export:
    name: Export Godot Web Build
    runs-on: ubuntu-latest
    env:
      PAGES_TOKEN_AVAILABLE: ${{ secrets.PAGES_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          include-templates: true
          use-dotnet: false

      - name: Export Web preset
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "${EXPORT_NAME}" "${EXPORT_PATH}"

      - name: Configure Pages
        if: env.PAGES_TOKEN_AVAILABLE != 'true'
        uses: actions/configure-pages@v5

      - name: Configure Pages with enablement
        if: env.PAGES_TOKEN_AVAILABLE == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
